# ── ldap-usergroup-sync ──────────────────────────────────────────────────────
# Extends the root docker-compose.yaml.  Run from the repo root with:
#
#   docker compose -f docker-compose.yaml -f ldap-sync/ldap-usergroup-sync/docker-compose.yaml up -d ldap-sync
#
# Or run a one-shot sync:
#   docker compose -f docker-compose.yaml -f ldap-sync/ldap-usergroup-sync/docker-compose.yaml run --rm ldap-sync ./sync.sh
#
# Seed test data:
#   docker compose -f docker-compose.yaml -f ldap-sync/ldap-usergroup-sync/docker-compose.yaml run --rm ldap-sync ./seed.sh

services:
  ldap-sync:
    build:
      context: ./ldap-sync/ldap-usergroup-sync
      dockerfile: Dockerfile
    container_name: ldap-usergroup-sync
    restart: unless-stopped
    volumes:
      - ./ldap-sync/ldap-usergroup-sync/:/opt/ldap-usergroup-sync
    networks:
      - operator-ip-kontaktbuch-network
    # The container only needs to reach Postgres (same Docker network) and
    # the external LDAP server (host network via bridge).
    depends_on:
      - postgres

networks:
  operator-ip-kontaktbuch-network:
    driver: bridge
