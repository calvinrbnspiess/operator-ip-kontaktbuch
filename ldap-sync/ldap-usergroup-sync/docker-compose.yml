version: "3.9"

# ── ldap-usergroup-sync ──────────────────────────────────────────────────────
# Extends the root docker-compose.yaml.  Run from the repo root with:
#
#   docker compose -f docker-compose.yaml -f ldap-sync/ldap-usergroup-sync/docker-compose.yml up -d ldap-sync
#
# Or run a one-shot sync:
#   docker compose -f docker-compose.yaml -f ldap-sync/ldap-usergroup-sync/docker-compose.yml \
#     run --rm ldap-sync ./sync.sh
#
# Seed test data:
#   docker compose -f docker-compose.yaml -f ldap-sync/ldap-usergroup-sync/docker-compose.yml \
#     run --rm ldap-sync ./seed.sh

services:
  ldap-sync:
    build:
      context: ./ldap-sync/ldap-usergroup-sync
      dockerfile: Dockerfile
    container_name: ldap-usergroup-sync
    restart: unless-stopped
    volumes:
      # Live-mount config so changes take effect without rebuilding the image
      - ./ldap-sync/ldap-usergroup-sync/config.yaml:/opt/ldap-usergroup-sync/config.yaml:ro
      # Persist logs on the host
      - ./ldap-sync/ldap-usergroup-sync/logs:/opt/ldap-usergroup-sync/logs
    networks:
      - operator-ip-kontaktbuch-network
    # The container only needs to reach Postgres (same Docker network) and
    # the external LDAP server (host network via bridge).
    depends_on:
      - postgres

networks:
  operator-ip-kontaktbuch-network:
    external: true
